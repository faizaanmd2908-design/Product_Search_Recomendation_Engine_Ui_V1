<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Login
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="background"></div>

  <div class="auth-box">

    <h1>
      Login
    </h1>

    <input
      id="login-email"
      type="email"
      placeholder="Email"
    >

    <input
      id="login-password"
      type="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <p>
      New user?
      <a href="signup.html">
        Sign Up
      </a>
    </p>

    <p>
      <a href="index.html">
        Back to Home
      </a>
    </p>

  </div>

  <script src="app.js"></script>

</body>

</html>
