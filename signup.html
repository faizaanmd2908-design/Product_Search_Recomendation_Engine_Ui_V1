<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sign Up
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="background"></div>

  <div class="auth-box">

    <h1>
      Sign Up
    </h1>

    <input
      id="signup-name"
      type="text"
      placeholder="Name"
    >

    <input
      id="signup-email"
      type="email"
      placeholder="Email"
    >

    <input
      id="signup-password"
      type="password"
      placeholder="Password"
    >

    <button onclick="signup()">
      Create Account
    </button>

    <p>
      Already have an account?
      <a href="login.html">
        Login
      </a>
    </p>

    <p>
      <a href="index.html">
        Back to Home
      </a>
    </p>

  </div>

  <script src="app.js"></script>

</body>

</html>
